<!DOCTYPE html>
<html>
<head>
    <title>Reference Document</title>
</head>
<body style="margin:0; padding:0; overflow:hidden; background-color:black;">
    <iframe id="gameFrame" style="position:fixed; top:0; left:0; width:100%; height:100%; border:none;"></iframe>

    <script>
        // This script automatically reads the game link you send to it
        const urlParams = new URLSearchParams(window.location.search);
        const gameUrl = urlParams.get('url');
        if (gameUrl) {
            document.getElementById('gameFrame').src = decodeURIComponent(gameUrl);
        } else {
            document.body.innerHTML = "<h2 style='color:white; padding:20px;'>No document loaded.</h2>";
        }
    </script>
</body>
</html>
